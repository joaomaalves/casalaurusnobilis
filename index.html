<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Laurus Nobilis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F7F4EF;
            --warm-sand: #E8E0D5;
            --terracotta: #C4956A;
            --deep-earth: #8B7355;
            --soft-white: #FDFCFA;
            --charcoal: #3A3530;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Subtle pattern background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(196, 149, 106, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(139, 115, 85, 0.06) 0%, transparent 50%),
                linear-gradient(180deg, var(--cream) 0%, var(--warm-sand) 100%);
            pointer-events: none;
            z-index: -1;
        }

        /* Header */
        header {
            padding: 80px 20px 60px;
            text-align: center;
            position: relative;
        }

        header::after {
            content: '🌿';
            display: block;
            font-size: 2rem;
            margin-top: 20px;
            opacity: 0.7;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--charcoal);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 300;
            font-style: italic;
            color: var(--deep-earth);
            letter-spacing: 0.3em;
            text-transform: lowercase;
        }

        .area-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 24px;
            margin-top: 36px;
            padding: 0 20px;
        }

        .area-nav a {
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--deep-earth);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .area-nav a:hover {
            color: var(--terracotta);
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 20px;
        }

        .lang-btn {
            font-family: 'Jost', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid var(--warm-sand);
            background: transparent;
            color: var(--deep-earth);
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .lang-btn:hover {
            border-color: var(--terracotta);
            color: var(--charcoal);
        }

        .lang-btn.active {
            background: var(--terracotta);
            border-color: var(--terracotta);
            color: var(--soft-white);
        }

        /* Gallery */
        .gallery {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 40px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            position: relative;
            background: var(--soft-white);
            border-radius: 4px;
            overflow: hidden;
            box-shadow:
                0 4px 20px rgba(58, 53, 48, 0.08),
                0 1px 3px rgba(58, 53, 48, 0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow:
                0 20px 40px rgba(58, 53, 48, 0.12),
                0 4px 12px rgba(58, 53, 48, 0.08);
        }

        .gallery-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }

        /* Image frame/mat effect */
        .gallery-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 12px solid var(--soft-white);
            pointer-events: none;
            z-index: 1;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(58, 53, 48, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 40px;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        .lightbox.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 10px 60px rgba(0, 0, 0, 0.4);
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2rem;
            color: var(--soft-white);
            cursor: pointer;
            transition: transform 0.2s ease;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }

        .lightbox-close:hover {
            transform: scale(1.2);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            color: var(--soft-white);
            cursor: pointer;
            padding: 20px;
            transition: opacity 0.2s ease;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            user-select: none;
        }

        .lightbox-nav:hover {
            opacity: 0.7;
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px 60px;
            font-size: 0.85rem;
            color: var(--deep-earth);
            letter-spacing: 0.1em;
        }

        footer .laurel {
            font-size: 1.5rem;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            header {
                padding: 60px 20px 40px;
            }

            .gallery {
                padding: 20px 20px 60px;
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .gallery-item img {
                height: 300px;
            }

            .lightbox-nav {
                font-size: 2rem;
                padding: 10px;
            }

            .lightbox-prev {
                left: 10px;
            }

            .lightbox-next {
                right: 10px;
            }
        }

        /* Staggered animation on load */
        .gallery-item {
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.15s; }
        .gallery-item:nth-child(3) { animation-delay: 0.2s; }
        .gallery-item:nth-child(4) { animation-delay: 0.25s; }
        .gallery-item:nth-child(5) { animation-delay: 0.3s; }
        .gallery-item:nth-child(6) { animation-delay: 0.35s; }
        .gallery-item:nth-child(7) { animation-delay: 0.4s; }
        .gallery-item:nth-child(8) { animation-delay: 0.45s; }
        .gallery-item:nth-child(9) { animation-delay: 0.5s; }
        .gallery-item:nth-child(10) { animation-delay: 0.55s; }
        .gallery-item:nth-child(11) { animation-delay: 0.6s; }
        .gallery-item:nth-child(12) { animation-delay: 0.65s; }
        .gallery-item:nth-child(n+13) { animation-delay: 0.7s; }

        /* Local guide */
        .guide {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 80px;
        }

        .guide-intro {
            text-align: center;
            margin-bottom: 60px;
        }

        .guide-intro h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .guide-intro p {
            font-size: 0.95rem;
            color: var(--deep-earth);
            max-width: 520px;
            margin: 0 auto;
        }

        .guide-section {
            margin-bottom: 56px;
        }

        .guide-section h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--warm-sand);
        }

        .place-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .place-card {
            background: var(--soft-white);
            border-radius: 4px;
            padding: 24px 28px;
            box-shadow:
                0 4px 20px rgba(58, 53, 48, 0.06),
                0 1px 3px rgba(58, 53, 48, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .place-card:hover {
            transform: translateY(-3px);
            box-shadow:
                0 12px 28px rgba(58, 53, 48, 0.1),
                0 2px 6px rgba(58, 53, 48, 0.06);
        }

        .place-header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px 16px;
            margin-bottom: 8px;
        }

        .place-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 500;
            color: var(--charcoal);
        }

        .place-distance {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: var(--terracotta);
            white-space: nowrap;
        }

        .place-desc {
            font-size: 0.9rem;
            color: var(--deep-earth);
            margin-bottom: 14px;
            line-height: 1.55;
        }

        .place-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
        }

        .place-links a {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--charcoal);
            text-decoration: none;
            border-bottom: 1px solid var(--terracotta);
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .place-links a:hover {
            color: var(--terracotta);
            border-color: var(--deep-earth);
        }

        @media (max-width: 768px) {
            .guide {
                padding: 0 20px 60px;
            }

            .place-card {
                padding: 20px;
            }

            .area-nav {
                gap: 6px 16px;
            }

            .area-nav a {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
